services:
  postgres:
    image: postgres:16-alpine
    container_name: estoril-flow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: estoril_flow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root123
      TZ: UTC
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d estoril_flow"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: root123
    command:
      - /bin/sh
      - -c
      - >
        if ! psql -h postgres -U postgres -d postgres -tAc
        "SELECT 1 FROM pg_database WHERE datname = 'estoril_flow'" | grep -q 1; then
          psql -h postgres -U postgres -d postgres -c "CREATE DATABASE estoril_flow";
        fi

volumes:
  postgres_data:
