spring:
  application:
    name: estoril-flow-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/estoril_flow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root123}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    time-zone: UTC

server:
logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
      issuer: ${JWT_ISSUER:estoril-flow}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
